# SimCLR + L_dim on STL-10 (optimal lambda from CIFAR-100 sweep)
# Usage: python scripts/train.py --config configs/simclr_stl10_dimreg.yaml

method: simclr
backbone: resnet18
temperature: 0.2

proj_hidden_dim: 2048
proj_out_dim: 128
proj_layers: 2

dataset: stl10
data_dir: ./data
batch_size: 256
epochs: 400
optimizer: adamw
lr: 0.001
weight_decay: 1e-4
warmup_epochs: 10

# ---- Dimensionality regularizer ----
use_dim_reg: true
dim_reg_weight: 0.5
dim_reg_momentum: 0.99
dim_reg_schedule: linear_warmup
dim_reg_warmup_epochs: 20
dim_reg_on: encoder

eval_every: 50
probe_epochs: 100
probe_lr: 0.3

wandb_project: dim-ssl
seed: 42
