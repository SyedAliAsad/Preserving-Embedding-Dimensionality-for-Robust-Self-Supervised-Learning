# Barlow Twins baseline on CIFAR-100
# Usage: python scripts/train.py --config configs/barlow_cifar100.yaml

method: barlow_twins
backbone: resnet18

# Barlow Twins projector: wide MLP as in original paper
proj_hidden_dim: 2048
proj_out_dim: 2048
proj_layers: 3

# Barlow Twins loss hyperparameters
bt_lambda: 0.005    # off-diagonal weight
bt_scale: 0.025     # total loss scale

dataset: cifar100
data_dir: ./data
batch_size: 256
epochs: 400
optimizer: adamw
lr: 0.001
weight_decay: 1e-4
warmup_epochs: 10

use_dim_reg: false

eval_every: 50
probe_epochs: 100
probe_lr: 0.3

wandb_project: dim-ssl
seed: 42
