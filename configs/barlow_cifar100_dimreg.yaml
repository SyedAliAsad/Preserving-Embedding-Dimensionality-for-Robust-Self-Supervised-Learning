# Barlow Twins + L_dim on CIFAR-100
# Usage: python scripts/train.py --config configs/barlow_cifar100_dimreg.yaml

method: barlow_twins
backbone: resnet18

proj_hidden_dim: 2048
proj_out_dim: 2048
proj_layers: 3

bt_lambda: 0.005
bt_scale: 0.025

dataset: cifar100
data_dir: ./data
batch_size: 256
epochs: 400
optimizer: adamw
lr: 0.001
weight_decay: 1e-4
warmup_epochs: 10

# ---- Dimensionality regularizer ----
use_dim_reg: true
dim_reg_weight: 0.5
dim_reg_momentum: 0.99
dim_reg_schedule: linear_warmup
dim_reg_warmup_epochs: 20
dim_reg_on: encoder

eval_every: 50
probe_epochs: 100
probe_lr: 0.3

wandb_project: dim-ssl
seed: 42
